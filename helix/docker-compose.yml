services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: helix_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helix_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/helix_dev
      NODE_ENV: development
      JWT_SECRET: helix-dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:8080
      COOKIE_SECRET: helix-dev-cookie-secret
      AZURE_AD_TENANT_ID: ""
      AZURE_AD_CLIENT_ID: ""
      AZURE_AD_CLIENT_SECRET: ""
      APPLICATIONINSIGHTS_CONNECTION_STRING: ""
      FRONTEND_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
